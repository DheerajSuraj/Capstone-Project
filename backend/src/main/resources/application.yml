spring:
  application:
    name: tsb-backend

  # ── Datasource ──────────────────────────────────────────────
  # Set explicitly rather than relying on docker-compose auto-derivation.
  # These MUST match compose.yaml's POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB.
  # Docker Compose support still starts the container; it just no longer
  # guesses the credentials for us.
  datasource:
    url: jdbc:postgresql://localhost:5433/tsb
    username: tsb
    password: tsb_dev_only
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────
  jpa:
    # THE footgun switch (roadmap §13.3): open-in-view keeps a DB session
    # open for the whole HTTP request, hiding lazy-loading bugs until prod.
    # Off from day one.
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate only VALIDATES that our entities
      # match the migrated schema — it never creates or alters tables.
      # This forces entities and migrations to agree, loudly, at startup.
      ddl-auto: validate

  # ── Flyway ──────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    # No migrations exist yet (Phase 1 delivers V1). Don't fail on that.
    fail-on-missing-locations: false

server:
  port: 8080
  error:
    include-message: always      # we return structured diagnostics; don't hide messages
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true            # /actuator/health/liveness + /readiness — used later by the VM uptime cron (roadmap §13.2)